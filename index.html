<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>途策 · TripMind</title>
<style>
:root{
  --bg:#0d0d0e;--surface:#161618;--surface-raised:#1c1c1e;--surface-high:#242426;
  --border:rgba(255,255,255,0.06);--border-active:rgba(255,255,255,0.12);
  --text:#f5f5f7;--text-secondary:#98989e;--text-tertiary:#636366;
  --gold:#d4a853;--gold-bg:rgba(212,168,83,0.08);
  --blue:#5e9ef5;--blue-bg:rgba(94,158,245,0.06);
  --green:#4cd964;--green-bg:rgba(76,217,100,0.06);
  --orange:#ff9f0a;
  --radius-sm:10px;--radius:16px;--radius-lg:20px;
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  min-height:100dvh;display:flex;justify-content:center;
  line-height:1.5;letter-spacing:-0.01em;
}
#app{width:100%;max-width:440px;min-height:100dvh;padding:0 clamp(20px,5vw,28px);display:flex;flex-direction:column}
.onboarding{flex:1;display:flex;flex-direction:column;justify-content:center;padding:clamp(32px,8vh,60px) 0;gap:clamp(28px,6vh,44px)}
.brand .logo{width:44px;height:44px;border-radius:12px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:20px;color:#0d0d0e;margin-bottom:14px;font-weight:700}
.brand h1{font-size:32px;font-weight:700;letter-spacing:-0.03em;line-height:1.1}
.brand .tagline{font-size:15px;color:var(--text-secondary);margin-top:6px}
.form-cards{display:flex;flex-direction:column;gap:10px}
.input-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px 18px;display:flex;align-items:center;gap:12px;cursor:text}
.input-card:focus-within{border-color:var(--border-active);background:var(--surface-raised)}
.input-card .icon{font-size:18px;flex-shrink:0;opacity:0.7}
.input-card input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:17px;font-family:var(--font)}
.input-card input::placeholder{color:var(--text-tertiary)}
.cta-btn{width:100%;padding:17px;border:none;border-radius:var(--radius);background:var(--gold);color:#0d0d0e;font-size:17px;font-weight:600;font-family:var(--font);cursor:pointer;transition:0.2s}
.cta-btn:active{opacity:0.8}
.cta-btn:disabled{opacity:0.4;pointer-events:none}
.analyzing{display:none;flex:1;flex-direction:column;align-items:center;justify-content:center;gap:24px}
.analyzing.active{display:flex}
.analyzing .pulse{width:56px;height:56px;border-radius:16px;background:var(--gold-bg);display:flex;align-items:center;justify-content:center;font-size:24px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.08);opacity:0.7}}
.analyzing-steps{display:flex;flex-direction:column;gap:10px;width:100%;max-width:280px}
.analyzing-step{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--text-tertiary);padding:10px 14px;border-radius:var(--radius-sm);background:var(--surface)}
.analyzing-step.done{color:var(--text-secondary)}.analyzing-step.current{color:var(--text);background:var(--surface-raised)}
.analyzing-step .check{color:var(--green);font-weight:700;opacity:0}.analyzing-step.done .check{opacity:1}
.results{display:none;flex-direction:column;gap:clamp(16px,3vh,24px);padding:24px 0 40px}
.results.active{display:flex}
.results-header{display:flex;align-items:center;justify-content:space-between}
.results-header .route{font-size:22px;font-weight:700;letter-spacing:-0.02em}
.results-header .route em{font-style:normal;color:var(--gold)}
.back-btn{font-size:14px;color:var(--text-secondary);cursor:pointer;background:none;border:none;font-family:var(--font)}
.rec-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:clamp(18px,4vw,24px)}
.rec-card .label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--gold);margin-bottom:6px}
.rec-card .mode{font-size:20px;font-weight:700;margin-bottom:4px}
.rec-card .main-data{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.data-item .d-label{font-size:12px;color:var(--text-tertiary)}
.data-item .d-value{font-size:20px;font-weight:700;margin-top:2px}
.data-item .d-sub{font-size:12px;color:var(--text-tertiary);margin-top:1px}

.why-section h3,.compare-section h3,.source-section h3,.discover-section h3{font-size:14px;font-weight:600;color:var(--text-secondary);margin-bottom:10px;letter-spacing:0.02em;text-transform:uppercase}
.compare-table{background:var(--surface);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column}
.compare-row{display:flex;align-items:center;padding:14px 16px;font-size:14px;gap:12px;border-bottom:1px solid var(--border)}
.compare-row:last-child{border:none}
.compare-row .c-label{width:44px;flex-shrink:0;font-weight:600;font-size:13px}
.compare-row .c-price{flex:1;font-weight:500}
.compare-row .c-time{color:var(--text-secondary);font-size:13px;flex:1}
.compare-row .c-delta{font-size:13px;font-weight:600;text-align:right;min-width:80px}
.delta-save{color:var(--green)}
.conclusion{background:var(--green-bg);border:1px solid rgba(76,217,100,0.15);border-radius:var(--radius-sm);padding:12px 16px;font-size:14px;color:var(--green);margin-top:8px;font-weight:500}

.plans-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.plan-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center;cursor:pointer;transition:0.2s}
.plan-card:hover,.plan-card.active{border-color:var(--gold);background:var(--surface-raised)}
.plan-card .p-name{font-size:14px;font-weight:600;margin-bottom:2px}
.plan-card .p-price{font-size:18px;font-weight:700;margin:6px 0 2px}
.plan-card .p-time{font-size:12px;color:var(--text-tertiary);margin-bottom:8px}
.stars{display:flex;flex-direction:column;gap:3px;align-items:center}
.star-row{font-size:11px;color:var(--text-tertiary);display:flex;align-items:center;gap:4px}
.star-row .fill{color:var(--gold)}

.source-list{display:flex;flex-direction:column;gap:1px;background:var(--surface);border-radius:var(--radius);overflow:hidden}
.source-item{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;font-size:13px;background:var(--surface)}
.source-item .s-name{color:var(--text-secondary)}.source-item .s-from{color:var(--text-tertiary)}
.source-update{text-align:right;font-size:11px;color:var(--text-tertiary);margin-top:6px}

.discover-list{display:flex;flex-direction:column;gap:8px}
.discover-item{background:var(--surface);border-radius:var(--radius);padding:14px 16px;font-size:14px;color:var(--text-secondary);border-left:3px solid var(--gold);line-height:1.6}
.discover-item .di-highlight{color:var(--text);font-weight:600}
.discover-item .di-value{color:var(--gold);font-weight:600}

.error-toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:#ff453a;color:#fff;padding:12px 24px;border-radius:var(--radius);font-size:14px;font-weight:600;z-index:999;display:none}
.error-toast.show{display:block}

.footer-note{text-align:center;font-size:12px;color:var(--text-tertiary);padding:4px 0}
</style>
</head>
<body>
<div id="app">
  <div class="onboarding" id="onboarding">
    <div class="brand">
      <div class="logo">✦</div>
      <h1>途策</h1>
      <p class="tagline">30秒，帮你决定这趟旅行怎么去最值</p>
    </div>
    <div class="form-cards">
      <div class="input-card"><span class="icon">📍</span><input id="origin" placeholder="出发地" value="南京"></div>
      <div class="input-card"><span class="icon">🎯</span><input id="destination" placeholder="目的地" value="深圳"></div>
      <div class="input-card"><span class="icon">📅</span><input id="days" placeholder="玩几天" value="5天" type="text"></div>
    </div>
    <button class="cta-btn" id="ctaBtn" onclick="analyze()">立即生成方案</button>
    <p class="footer-note">40+ 城市覆盖 · 动态路线引擎 · 数据可验证</p>
  </div>

  <div class="analyzing" id="analyzing">
    <div class="pulse">✦</div>
    <div class="analyzing-steps" id="analyzeSteps">
      <div class="analyzing-step"><span class="check">✓</span> 查询交通数据</div>
      <div class="analyzing-step"><span class="check">✓</span> 计算成本对比</div>
      <div class="analyzing-step"><span class="check">✓</span> 分析时间效率</div>
      <div class="analyzing-step"><span class="check">✓</span> 生成可信推荐</div>
    </div>
  </div>

  <div class="results" id="results"></div>
  <div class="error-toast" id="errorToast"></div>
</div>

<script>
(function(){
'use strict';

var CITY_DB = {
  '北京':{lat:39.9,lng:116.4},'上海':{lat:31.2,lng:121.5},'广州':{lat:23.1,lng:113.3},'深圳':{lat:22.5,lng:114.1},
  '成都':{lat:30.6,lng:104.1},'杭州':{lat:30.3,lng:120.2},'南京':{lat:32.1,lng:118.8},'武汉':{lat:30.6,lng:114.3},
  '西安':{lat:34.3,lng:108.9},'重庆':{lat:29.5,lng:106.5},'长沙':{lat:28.2,lng:113.0},'郑州':{lat:34.8,lng:113.7},
  '济南':{lat:36.7,lng:117.0},'天津':{lat:39.1,lng:117.2},'合肥':{lat:31.9,lng:117.3},'南昌':{lat:28.7,lng:115.9},
  '福州':{lat:26.1,lng:119.3},'厦门':{lat:24.5,lng:118.1},'昆明':{lat:25.0,lng:102.7},'贵阳':{lat:26.6,lng:106.7},
  '南宁':{lat:22.8,lng:108.3},'海口':{lat:20.0,lng:110.3},'三亚':{lat:18.2,lng:109.5},'石家庄':{lat:38.0,lng:114.5},
  '太原':{lat:37.9,lng:112.5},'沈阳':{lat:41.8,lng:123.4},'长春':{lat:43.9,lng:125.3},'哈尔滨':{lat:45.8,lng:126.6},
  '兰州':{lat:36.1,lng:103.8},'西宁':{lat:36.6,lng:101.8},'乌鲁木齐':{lat:43.8,lng:87.6},'拉萨':{lat:29.7,lng:91.1},
  '呼和浩特':{lat:40.8,lng:111.7},'银川':{lat:38.5,lng:106.3},'苏州':{lat:31.3,lng:120.6},'无锡':{lat:31.6,lng:120.3},
  '宁波':{lat:29.9,lng:121.5},'青岛':{lat:36.1,lng:120.4},'大连':{lat:38.9,lng:121.6},'黄山':{lat:29.7,lng:118.3},
  '桂林':{lat:25.3,lng:110.3},'丽江':{lat:26.9,lng:100.2},'大理':{lat:25.6,lng:100.2},'张家界':{lat:29.1,lng:110.5},
  '洛阳':{lat:34.6,lng:112.5}
};

var WAYPOINTS = [
  {name:'黄山',spots:'宏村、黄山风景区'},{name:'婺源',spots:'篁岭、江湾'},{name:'景德镇',spots:'陶瓷博物馆、陶溪川'},
  {name:'洛阳',spots:'龙门石窟、白马寺'},{name:'桂林',spots:'漓江、阳朔'},{name:'遵义',spots:'遵义会议会址'},
  {name:'安顺',spots:'黄果树瀑布'},{name:'平遥',spots:'平遥古城'},{name:'扬州',spots:'瘦西湖'},{name:'绍兴',spots:'鲁迅故里'},
  {name:'岳阳',spots:'岳阳楼、洞庭湖'},{name:'宜昌',spots:'三峡大坝'},{name:'开封',spots:'清明上河园'}
];

function haversineKm(a,b){
  var R=6371,dlat=(b.lat-a.lat)*Math.PI/180,dlng=(b.lng-a.lng)*Math.PI/180;
  var alat=a.lat*Math.PI/180,blat=b.lat*Math.PI/180;
  var x=Math.sin(dlat/2)*Math.sin(dlat/2)+Math.cos(alat)*Math.cos(blat)*Math.sin(dlng/2)*Math.sin(dlng/2);
  return Math.round(2*R*Math.asin(Math.sqrt(x)));
}
function fmt(n){return n.toLocaleString()+'元'}
function parseDays(s){var n=parseInt(s);return isNaN(n)||n<1?5:n>30?30:n}
function matchCity(name){
  name=name.trim();
  if(CITY_DB[name]) return name;
  var keys=Object.keys(CITY_DB);
  for(var i=0;i<keys.length;i++){if(keys[i].includes(name)||name.includes(keys[i])) return keys[i];}
  return null;
}
function showError(msg){
  var t=document.getElementById('errorToast');if(!t) return;
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')},3000);
}

// ═══ 核心引擎 ═══

function generatePlan(origin,dest,days){
  var o=matchCity(origin),d=matchCity(dest);
  if(!o||!d){showError('未识别城市，请输入完整城市名');return null}

  var dist=haversineKm(CITY_DB[o],CITY_DB[d]);

  // 单程基础价格（校准至12306/携程真实价格）
  // 高铁：铁路实际距离>直线距离，分段系数校准
  var trainOneWay=dist<500?Math.round(dist*0.5):dist<1000?Math.round(dist*0.55):Math.round(dist*0.65);

  // 飞机：经济舱均价，分段校准
  var planeOneWay=dist<500?450:dist<800?700:dist<1200?1000:dist<1500?1300:dist<2000?1800:2500;

  // 自驾：道路实际距离≈直线×1.2，油费+高速费≈0.95元/km
  var driveDist=dist*1.2;
  var driveOneWay=Math.round(driveDist*0.95);
  var driveToll=Math.round(driveDist*0.45);

  // 往返交通成本（整体行程）
  var planePrice=planeOneWay*2;
  var trainPrice=trainOneWay*2;
  var driveCost=driveOneWay*2;

  // 时间（含接驳）
  var planeTime=dist<500?1.5:dist<800?2:dist<1200?2.5:dist<1500?3:dist<2000?3.5:4.5;
  var planeTotal=(planeTime+3)*2; // 往返含两次机场接驳
  var trainTime=Math.round(dist/280);
  var trainTotal=(trainTime+1.5)*2;
  var driveTime=Math.round(driveDist/85);
  var driveTotal=driveTime*2; // 往返驾驶时间
  var driveDays=Math.ceil(driveTotal/8);

  // 推荐方案：天数影响策略
  // 短途(1-2天)：时间宝贵，优先飞机/高铁
  // 中途(3-5天)：平衡性价比，自驾开始有竞争力
  // 长途(6天+)：自驾自由度高
  var recMode,recPrice,recTime;
  if(days<=2){
    if(dist<800){recMode='高铁';recPrice=trainPrice;recTime='往返 '+trainTime*2+'小时'}
    else{recMode='飞机';recPrice=planePrice;recTime='往返 '+planeTime*2+'小时'}
  }else if(days<=5){
    if(dist<600){recMode='高铁';recPrice=trainPrice;recTime='往返 '+trainTime*2+'小时'}
    else if(dist>1500){recMode='飞机';recPrice=planePrice;recTime='往返 '+planeTime*2+'小时'}
    else if(dist<=1200&&driveDays<=days){recMode='自驾';recPrice=driveCost;recTime='往返 '+driveTotal+'小时'}
    else{recMode='高铁';recPrice=trainPrice;recTime='往返 '+trainTime*2+'小时'}
  }else{
    if(dist<=1500&&driveDays+1<=days){recMode='自驾';recPrice=driveCost;recTime='往返 '+driveTotal+'小时'}
    else if(dist<800){recMode='高铁';recPrice=trainPrice;recTime='往返 '+trainTime*2+'小时'}
    else{recMode='飞机';recPrice=planePrice;recTime='往返 '+planeTime*2+'小时'}
  }

  // 对比数据（均为往返）
  var comparison=[
    {mode:'飞机',price:planePrice,time:planeTime*2+'h',totalTime:planeTotal,rawTime:planeTime*2},
    {mode:'高铁',price:trainPrice,time:trainTime*2+'h',totalTime:trainTotal,rawTime:trainTime*2},
    {mode:'自驾',price:driveCost,time:driveTotal+'h',totalTime:driveTotal,rawTime:driveTotal}
  ];

  var cheapest=comparison[0];
  for(var i=1;i<comparison.length;i++){if(comparison[i].price<cheapest.price) cheapest=comparison[i];}

  // 为什么推荐
  var saving=Math.abs(planePrice-trainPrice);
  var timeDiff=Math.abs(planeTotal-trainTotal);
  var con='';
  if(recMode==='自驾'){
    con='往返自驾总交通成本'+fmt(driveCost)+'，'+driveDays+'天行程你拥有完全自由度，沿途随时停靠探索';
  }else if(recMode==='高铁'){
    if(planePrice>trainPrice+800) con='往返差价'+fmt(saving)+'，仅增加约'+Math.round(timeDiff)+'小时。当前场景下高铁性价比最高';
    else con='高铁与飞机往返价格接近，高铁班次更灵活，省去机场接驳折腾';
  }else{
    con='距离'+dist+'km，飞机往返'+planeTime*2+'小时，'+days+'天行程时间效率优先';
  }

  // 星级评分
  var prices=[planePrice,trainPrice,driveCost];
  var times=[planeTotal,trainTotal,driveTotal];
  var pSorted=prices.slice().sort(function(a,b){return a-b});
  var tSorted=times.slice().sort(function(a,b){return a-b});
  function starRating(val,sorted){return val===sorted[0]?5:val===sorted[1]?4:3}

  var plans=[
    {id:'plane',name:'飞机',price:fmt(planePrice),time:'往返 '+planeTime*2+'h',
     stars:{cost:starRating(planePrice,pSorted),time:starRating(planeTotal,tSorted),exp:3}},
    {id:'train',name:'高铁',price:fmt(trainPrice),time:'往返 '+trainTime*2+'h',
     stars:{cost:starRating(trainPrice,pSorted),time:starRating(trainTotal,tSorted),exp:4}},
    {id:'drive',name:'自驾',price:fmt(driveCost),time:'往返 '+driveTotal+'h',
     stars:{cost:starRating(driveCost,pSorted),time:starRating(driveTotal,tSorted),exp:5}}
  ];

  // 你可能没想到
  var discoveries=[];
  // 两人同行
  var twoDrive=Math.round(driveCost/4); // 2人分摊往返
  if(Math.abs(twoDrive-trainPrice/2)<200) discoveries.push({t:'<span class="di-highlight">2人同行</span>，自驾人均 <span class="di-value">'+fmt(Math.round(driveCost/2))+'</span>，接近高铁人均 <span class="di-value">'+fmt(Math.round(trainPrice/2))+'</span>，且自由度高'});

  // 自驾路程提示
  if(recMode!=='自驾'&&driveDays<=days){
    discoveries.push({t:'其实往返自驾只需 <span class="di-value">'+driveDays+'天</span> 在路上（每天开8小时），你'+days+'天的行程完全够用，沿途还能解锁更多风景'});
  }

  // 节假日提示
  var now=new Date();
  var month=now.getMonth()+1,day=now.getDate();
  if((month===1&&day>=20)||month===2||(month===9&&day>=25)||(month===10&&day<=8)){
    discoveries.push({t:'当前处于节假日窗口期，高速公路可能<span class="di-highlight">免费通行</span>，往返自驾可省 <span class="di-value">'+fmt(driveToll*2)+'</span> 高速费'});
  }

  // 沿途双城
  for(var i=0;i<WAYPOINTS.length;i++){
    var wp=WAYPOINTS[i],wpc=CITY_DB[wp.name];if(!wpc) continue;
    var dToMid=haversineKm(wpc,{lat:(CITY_DB[o].lat+CITY_DB[d].lat)/2,lng:(CITY_DB[o].lng+CITY_DB[d].lng)/2});
    if(dToMid<dist*0.35&&wp.name!==o&&wp.name!==d){
      var extraCost=Math.round(haversineKm(CITY_DB[o],wpc)*0.75*2);
      discoveries.push({t:d+' + '+wp.name+' 双城联程，自驾仅额外增加约 <span class="di-value">'+fmt(extraCost)+'</span> 交通成本'});
      break;
    }
  }

  return {
    origin:o,dest:d,dist:dist,days:Math.max(days,driveDays||1),
    rec:{mode:recMode,price:recPrice,time:recTime},
    comparison:comparison,conclusion:con,
    saving:saving,timeDiff:timeDiff,
    cheapest:cheapest,
    plans:plans,recPlanId:recMode==='高铁'?'train':recMode==='飞机'?'plane':recMode==='自驾'?'drive':'train',
    discoveries:discoveries.slice(0,3),
    driveToll:driveToll,trainPrice:trainPrice,planePrice:planePrice,driveCost:driveCost,
    oneWay:{plane:planeOneWay,train:trainOneWay,drive:driveOneWay}
  };
}

// ═══ 界面 ═══
var currentData=null,activeId='train';

function analyze(){
  try{
    var o=document.getElementById('origin'),d=document.getElementById('destination'),dy=document.getElementById('days');
    var ov=o?o.value.trim():'',dv=d?d.value.trim():'';
    if(!ov||!dv){showError('请输入出发地和目的地');return}
    var btn=document.getElementById('ctaBtn');if(btn) btn.disabled=true;

    document.getElementById('onboarding').style.display='none';
    var az=document.getElementById('analyzing');az.classList.add('active');

    var steps=document.getElementById('analyzeSteps').querySelectorAll('.analyzing-step');
    for(var i=0;i<steps.length;i++) steps[i].classList.remove('done','current');

    (function step(idx){
      if(idx>=steps.length){
        setTimeout(function(){az.classList.remove('active');render(ov,dv,parseDays(dy?dy.value:'5'))},300);
        return;
      }
      if(idx>0) steps[idx-1].classList.add('done');
      steps[idx].classList.add('current');
      setTimeout(function(){step(idx+1)},350);
    })(0);
  }catch(e){
    showError('出错了: '+e.message);
    var btn=document.getElementById('ctaBtn');if(btn) btn.disabled=false;
  }
}

function render(origin,dest,days){
  var plan=generatePlan(origin,dest,days);
  if(!plan){document.getElementById('onboarding').style.display='flex';document.getElementById('ctaBtn').disabled=false;return}
  currentData=plan;activeId=plan.recPlanId;
  buildResults();
  document.getElementById('ctaBtn').disabled=false;
}

function buildResults(){
  var d=currentData,r=document.getElementById('results');

  // 星级渲染
  function stars(s){var h='';for(var i=0;i<5;i++) h+='<span class="'+(i<s?'fill':'')+'">★</span>';return h}

  var plansHtml='';
  for(var i=0;i<d.plans.length;i++){
    var p=d.plans[i];
    plansHtml+='<div class="plan-card'+(p.id===activeId?' active':'')+'" onclick="switchP(\''+p.id+'\')"><div class="p-name">'+p.name+'</div><div class="p-price">'+p.price+'</div><div class="p-time">'+p.time+'</div><div class="stars"><div class="star-row">成本'+stars(p.stars.cost)+'</div><div class="star-row">时间'+stars(p.stars.time)+'</div><div class="star-row">体验'+stars(p.stars.exp)+'</div></div></div>';
  }

  var compareHtml='';
  for(var i=0;i<d.comparison.length;i++){
    var c=d.comparison[i];
    var delta='';
    if(c.mode!==d.rec.mode){
      var gap=c.price-d.rec.price;
      if(gap>0) delta='<span style="color:var(--text-tertiary);font-size:12px">贵 '+gap+' 元</span>';
      else delta='<span class="delta-save">省 '+Math.abs(gap)+' 元</span>';
    }else{
      delta='<span style="color:var(--green);font-size:12px">推荐</span>';
    }
    compareHtml+='<div class="compare-row"><span class="c-label">'+c.mode+'</span><span class="c-price">往返 '+fmt(c.price)+'</span><span class="c-time">往返约 '+c.totalTime+'h</span><span class="c-delta">'+delta+'</span></div>';
  }

  var discoverHtml='';
  for(var i=0;i<d.discoveries.length;i++){
    discoverHtml+='<div class="discover-item">💡 '+d.discoveries[i].t+'</div>';
  }

  var now=new Date();
  var ts=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');

  r.innerHTML='<div class="results-header"><div class="route">'+d.origin+' <em>→</em> '+d.dest+'</div><button class="back-btn" onclick="goBack()">← 重新规划</button></div>'+

    '<div class="rec-card"><div class="label">★ 推荐方案</div><div class="mode">'+d.rec.mode+'</div><div class="main-data"><div class="data-item"><span class="d-label">往返交通总成本</span><div class="d-value">'+fmt(d.rec.price)+'</div></div><div class="data-item"><span class="d-label">往返总耗时</span><div class="d-value">'+d.rec.time+'</div><span class="d-sub">'+d.days+'天行程</span></div></div></div>'+

    '<div class="why-section"><h3>为什么是'+d.rec.mode+'</h3><div class="compare-table">'+compareHtml+'</div><div class="conclusion">'+d.conclusion+'</div></div>'+

    '<div class="compare-section"><h3>方案对比</h3><div class="plans-grid">'+plansHtml+'</div></div>'+

    '<div class="source-section"><h3>数据依据</h3><div class="source-list"><div class="source-item"><span class="s-name">高铁票价</span><span class="s-from">基准：12306 二等座均价</span></div><div class="source-item"><span class="s-name">机票价格</span><span class="s-from">基准：携程经济舱均价</span></div><div class="source-item"><span class="s-name">路线距离</span><span class="s-from">基准：高德地图驾车导航</span></div></div><div class="source-update">数据更新时间 '+ts+'</div></div>'+

    '<div class="discover-section"><h3>你可能没想到</h3><div class="discover-list">'+discoverHtml+'</div></div>';

  r.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

function switchP(id){activeId=id;buildResults();window.scrollTo({top:document.querySelector('.why-section')?document.querySelector('.why-section').offsetTop-20:0,behavior:'smooth'})}
function goBack(){document.getElementById('results').classList.remove('active');document.getElementById('results').innerHTML='';document.getElementById('onboarding').style.display='flex';currentData=null}
document.addEventListener('keydown',function(e){if(e.key==='Enter'&&document.activeElement&&document.activeElement.id==='days') analyze()});

window.analyze=analyze;window.switchP=switchP;window.goBack=goBack;
})();
</script>
</body>
</html>
